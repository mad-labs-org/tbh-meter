# ruff.toml — reader lint (Python · Windows). DEV tool only:
# the runtime stays ZERO-DEP (pure ctypes, no pip) — ruff does NOT ship in the reader.
#   run without installing:  uvx ruff check .     (uv is already in the environment)
#   install permanently:     brew install ruff
target-version = "py311"
line-length = 110

[lint]
# Bugs > style. F = pyflakes (undefined name / dead import|var — what refactors
# most often break); E9 = syntax errors; B = flake8-bugbear (real traps).
# Import sorting (I) and `ruff format` are left to their own pass — they generate
# style churn that shouldn't be mixed with logic refactors.
select = ["F", "E9", "B"]
